<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代理管控台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f8fafc; font-family: "PingFang SC", sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
        .emp-row { background: #fff; padding: 15px; border-bottom: 1px dashed #ccc; display: flex; align-items: center; }
        .name { flex: 2; font-weight: bold; font-size: 18px; }
        .order-btn { background: #000; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .st-btn { padding: 5px 12px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; margin-left: 5px; font-size: 14px; }
        .active-on { background: #10b981; color: #fff; border-color: #10b981; }
        .active-off { background: #64748b; color: #fff; border-color: #64748b; }
        .order-form { display: none; background: #fff; border: 2px solid #000; padding: 20px; margin-top: 10px; border-radius: 8px; }
        .f-input { width: 100%; border: none; border-bottom: 1px solid #000; padding: 10px; font-size: 16px; margin-bottom: 15px; outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 6px; }
        /* 弹窗样式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-c { background: #fff; width: 90%; max-width: 600px; padding: 20px; border-radius: 10px; border: 2px solid #000; }
    </style>
</head>
<body>
    <div class="header">
        <div><h2>代理管控台</h2><p id="info">载入中...</p></div>
        <div style="display:flex; gap:10px;">
            <button class="st-btn" onclick="openHistory()" style="background:#2563eb; color:#fff;">📋 我的发单</button>
            <button class="st-btn" onclick="window.location.href='index.html'">退出</button>
        </div>
    </div>
    <div id="list">正在拉取员工状态...</div>

    <div id="hModal" class="modal"><div class="modal-c"><h3>今日发单明细</h3><div id="hList" style="margin:15px 0;"></div><button class="submit-btn" onclick="document.getElementById('hModal').style.display='none'">关闭</button></div></div>

    <script>
        const client = supabase.createClient('https://rdqnfgsichwzxrvzluyg.supabase.co', 'sb_publishable_lpKx8N7N6s3JNKbcmqyBGQ_to3pZXQk');
        const params = new URLSearchParams(window.location.search);
        const city = params.get('city'), agent = params.get('agent');
        document.getElementById('info').innerText = `城市：${city} | 账号：${agent}`;

        window.toggleForm = (id) => {
            const el = document.getElementById(`f_${id}`);
            const isV = el.style.display === 'block';
            document.querySelectorAll('.order-form').forEach(f => f.style.display = 'none');
            if(!isV) el.style.display = 'block';
        };

        // 核心：实时黑名单锁死逻辑
        async function checkBlack(id) {
            const phone = document.getElementById(`c_${id}`).value.trim();
            const btn = document.getElementById(`s_${id}`);
            const { data } = await client.from('blacklist').select('contact').eq('contact', phone);
            
            if(data && data.length > 0) {
                btn.disabled = true;
                btn.style.background = "#ef4444";
                btn.innerText = "🚨 黑名单号码，严禁下单！";
                btn.style.cursor = "not-allowed";
            } else {
                btn.disabled = false;
                btn.style.background = "#000";
                btn.innerText = "确认发送订单";
                btn.style.cursor = "pointer";
            }
        }

        window.send = async (id, emp) => {
            const c = document.getElementById(`c_${id}`).value, a = document.getElementById(`a_${id}`).value, p = document.getElementById(`p_${id}`).value;
            if(!c) return alert("联系方式必填");
            await client.from('orders').insert([{ employee_id: emp, city_name: city, agent_username: agent, customer_contact: c, address: a, price: p, status: 'confirming' }]);
            alert("下单成功！"); load();
        };

        window.upSt = async (id, st) => {
            await client.from('employees').update({ work_status: st }).eq('id', id);
            load();
        };

        async function openHistory() {
            const today = new Date().toISOString().split('T')[0];
            const { data } = await client.from('orders').select('*').eq('agent_username', agent).gte('created_at', today);
            document.getElementById('hList').innerHTML = data.length ? data.map(o => `<div style="padding:8px; border-bottom:1px solid #eee;">员工：${o.employee_id} | 客户：${o.customer_contact} | 状态：${o.status}</div>`).join('') : '今日尚无发单';
            document.getElementById('hModal').style.display = 'flex';
        }

        async function load() {
            const { data: emps } = await client.from('employees').select('*').eq('city_name', city).order('id', {ascending:true});
            document.getElementById('list').innerHTML = emps.map(e => {
                const isOff = e.work_status === '离岗';
                return `
                <div class="emp-row">
                    <div class="name">${e.employee_id}</div>
                    <button class="order-btn" ${isOff?'disabled':''} onclick="toggleForm(${e.id})">${isOff?'已封禁':'下单 ↓'}</button>
                    <div style="flex:1.5; text-align:right;">
                        <button class="st-btn ${!isOff?'active-on':''}" onclick="upSt(${e.id}, '在岗')">在岗</button>
                        <button class="st-btn ${isOff?'active-off':''}" onclick="upSt(${e.id}, '离岗')">离岗</button>
                    </div>
                </div>
                <div class="order-form" id="f_${e.id}">
                    <input type="text" id="c_${e.id}" class="f-input" placeholder="联系方式（输入时自动检测黑名单）" oninput="checkBlack(${e.id})">
                    <input type="text" id="a_${e.id}" class="f-input" placeholder="服务地址">
                    <input type="text" id="p_${e.id}" class="f-input" placeholder="预估价格">
                    <button id="s_${e.id}" class="submit-btn" onclick="send(${e.id},'${e.employee_id}')">确认发送订单</button>
                </div>`;
            }).join('');
        }
        load();
    </script>
</body>
</html>
